<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <nav class="sidebar">
        <div class="logo">
            <i class="fas fa-building-circle-check"></i>
            <span>HMS Pro</span>
        </div>
        <ul class="nav-links">
            <li class="active" data-view="halls">
                <i class="fas fa-hotel"></i>
                <span>Halls</span>
            </li>
            <li data-view="enquiries">
                <i class="fas fa-envelope-open-text"></i>
                <span>Enquiries</span>
            </li>
            <li data-view="customers">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </li>
        </ul>
        <div class="user-profile">
            <div class="avatar">AD</div>
            <div class="info">
                <p class="name">Admin User</p>
                <p class="role">System Administrator</p>
            </div>
        </div>
    </nav>

    <main class="content">
          <section id="halls-view" class="view active">
            <div class="view-header">
                <h1 class="view-title">Halls</h1>
                
            </div>
            <div class="grid" id="halls-grid">
                <!-- Data injected here -->
            </div>
        </section>

        <section id="enquiries-view" class="view">
            <h1 class="view-title">Manage Enquiries</h1>
            <div class="table-card">
                <div class="table-container">
                    <table id="enquiries-table-full">
                        <thead>
                            <tr>
                                <th>Enquiry ID</th>
                                <th>Customer ID</th>
                                <th>Hall ID</th>
                                <th>Status</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="customers-view" class="view">
            <h1 class="view-title">Customer Database</h1>
            <div class="table-card">
                <div class="table-container">
                    <table id="customers-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
